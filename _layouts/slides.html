<!doctype html>
<html lang="{{ site.lang | default: 'zh-CN' }}">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    {% seo %}
    {% assign asset_version = site.time | date: "%s" %}
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/reveal.js@5.1.0/dist/reveal.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/reveal.js@5.1.0/dist/theme/white.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/reveal.js@5.1.0/plugin/highlight/monokai.css">
    <link rel="stylesheet" href="{{ '/assets/css/slides.css' | relative_url }}?v={{ asset_version }}">
    <script>
      window.MathJax = {
        tex: {
          inlineMath: [["\\(", "\\)"]],
          displayMath: [["$$", "$$"], ["\\[", "\\]"]]
        },
        startup: {
          typeset: false
        }
      };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" defer></script>
  </head>
  <body class="slides-body">
    <a class="deck-home" href="{{ '/slides/' | relative_url }}" data-i18n-zh="幻灯片" data-i18n-en="Slides">幻灯片</a>

    <div class="reveal">
      <div class="slides" id="deck-slides"></div>
    </div>

    <div class="deck-controls" aria-label="Slide controls">
      <button type="button" data-slide-prev aria-label="Previous slide">‹</button>
      <button type="button" data-slide-next aria-label="Next slide">›</button>
      <button type="button" data-slide-fullscreen data-fullscreen-label="Fullscreen" data-exit-label="Exit">Fullscreen</button>
      <label>
        <span>Theme</span>
        <select data-slide-theme-select aria-label="Slide theme">
          <option value="paper">Paper</option>
          <option value="sage">Sage</option>
          <option value="midnight">Midnight</option>
          <option value="amber">Amber</option>
        </select>
      </label>
      <label>
        <span>Play</span>
        <select data-slide-autoplay aria-label="Autoplay">
          <option value="0">Off</option>
          <option value="5000">5s</option>
          <option value="10000">10s</option>
          <option value="20000">20s</option>
        </select>
      </label>
    </div>

    <template id="deck-source">
      {{ content }}
    </template>

    <script src="https://cdn.jsdelivr.net/npm/reveal.js@5.1.0/dist/reveal.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/reveal.js@5.1.0/plugin/highlight/highlight.js"></script>
    <script src="{{ '/assets/js/slides.js' | relative_url }}?v={{ asset_version }}"></script>
  </body>
</html>
