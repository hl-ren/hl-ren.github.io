---
layout: default
---

<article class="page-shell">
  <header class="page-header">
    <p class="eyebrow">{{ page.eyebrow | default: "Page" }}</p>
    <h1{% if page.title_en %} data-i18n-zh="{{ page.title }}" data-i18n-en="{{ page.title_en }}"{% endif %}>{{ page.title }}</h1>
    {% if page.description %}
      <p class="page-description"{% if page.description_en %} data-i18n-zh="{{ page.description }}" data-i18n-en="{{ page.description_en }}"{% endif %}>{{ page.description }}</p>
    {% endif %}
  </header>

  <div class="prose">
    {{ content }}
  </div>
</article>
