<!doctype html>
<html lang="{{ site.lang | default: 'zh-CN' }}">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    {% seo %}
    {% assign asset_version = site.time | date: "%s" %}
    <link rel="alternate" type="application/atom+xml" title="{{ site.title }}" href="{{ '/feed.xml' | relative_url }}">
    <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}?v={{ asset_version }}">
    <script src="{{ '/assets/js/search.js' | relative_url }}?v={{ asset_version }}" data-search-index="{{ '/search.json' | relative_url }}" defer></script>
    {% if site.analytics.enabled %}
      {% if site.analytics.provider == "goatcounter" and site.analytics.goatcounter.code %}
        <script src="{{ '/assets/js/click-tracking.js' | relative_url }}" data-track-outbound="{{ site.analytics.goatcounter.track_outbound_clicks }}" defer></script>
      {% endif %}
    {% endif %}
  </head>
  <body>
    {% include header.html %}
    <main class="site-main">
      {{ content }}
    </main>
    {% include footer.html %}
    {% include analytics.html %}
  </body>
</html>
